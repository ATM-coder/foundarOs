  });

          if (root.children.length > 0) {
            hideLoader();
            observer.disconnect();
          }
        });

        if (root.children.length > 0) {
          hideLoader();
          return;
        }
        
        observer.observe(root, { childList: true });
        
        // Fallback: if after 8 seconds the page has no visible content, show recovery.
        // Task #1435: surface the underlying cause via showRecovery(reason, details)
        // so the user sees the actual error, not just an opaque spinner.
        setTimeout(function() {
          var isTopLevel = (window === window.parent);
          var usingCdnFallback = /[?&]cdn=fallback/.test(window.location.search);
          var alreadyTriedCdn = false;
          try { alreadyTriedCdn = !!sessionStorage.getItem('__audos_cdn_fallback'); } catch(e) {}

          // CDN fallback helper: redirect with ?cdn=fallback so the server
          // rewrites the import map from esm.sh to cdn.jsdelivr.net.
          function tryCdnFallback() {
            if (!isTopLevel || usingCdnFallback || alreadyTriedCdn) return false;
            try { sessionStorage.setItem('__audos_cdn_fallback', String(Date.now())); } catch(e) {}
            var u = new URL(window.location.href);
            u.searchParams.set('cdn', 'fallback');
            u.searchParams.set('_cb', String(Date.now()));
            window.location.replace(u.toString());
            return true;
          }

          if (fatalError) {
            if (tryCdnFallback()) return;
            showRecovery('A script error prevented the page from loading.', fatalError);
            return;
          }
          if (root.children.length === 0) {
            var alreadyRetried = false;
            try { alreadyRetried = !!sessionStorage.getItem('__audos_cold_retry'); } catch(e) {}

            if (isTopLevel && !alreadyRetried) {
              // Step 1: cold-start retry (warm the compile cache)
              try { sessionStorage.setItem('__audos_cold_retry', String(Date.now())); } catch(e) {}
              var u = new URL(window.location.href);
              u.searchParams.set('_cb', String(Date.now()));
              window.location.replace(u.toString());
              return;
            }
            // Step 2: CDN fallback — esm.sh may be unreachable
            if (tryCdnFallback()) return;
            showRecovery('The page failed to load. This may be a network or regional issue.', 'No content rendered in the root element after 8s. The application bundle may have failed to evaluate.');
            return;
          }
          // Check if rendered content has any visible height
          var hasVisibleContent = root.offsetHeight > 50 || root.scrollHeight > 50;
          if (!hasVisibleContent) {
            showRecovery('The page loaded but appears empty.', 'The root element has children but no visible height. The component tree may have rendered null.');
            return;
          }
          // Hide loader if still showing
          hideLoader();
        }, 8000);
      })();
    </script>
  </body>
